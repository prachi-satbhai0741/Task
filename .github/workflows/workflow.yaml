name: Environment Variables Demo

on:
  push:

env:
  APP_NAME: my-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - run: echo "Output" > result.txt

      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: result

      - run: cat result.txt
